<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAMP — Auth & Proxy</title>
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #121620;
            --border-color: #1c2230;
            --text-main: #ffffff;
            --text-secondary: #636e81;
            --blue-gradient: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            --red-accent: #da0000;
            --green-accent: #238636;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, sans-serif;
            margin: 0; padding: 15px;
        }

        .container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            max-width: 400px;
            margin: 0 auto;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .badge { background: #442222; color: #ff4444; padding: 4px 12px; border-radius: 20px; font-size: 11px; margin-bottom: 8px; display: inline-block; }
        
        .section-title { font-size: 14px; font-weight: bold; margin: 15px 0 10px; display: flex; align-items: center; gap: 8px; }
        
        .input-group { margin-bottom: 12px; }
        label { display: block; color: var(--text-secondary); font-size: 11px; margin-bottom: 5px; text-transform: uppercase; }
        
        .input-wrapper { background: #0b0e14; border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; display: flex; }
        input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 14px; }

        .proxy-options { display: flex; gap: 10px; margin-bottom: 15px; }
        .option { 
            flex: 1; background: #0b0e14; border: 1px solid var(--border-color); 
            padding: 10px; border-radius: 8px; text-align: center; font-size: 12px; cursor: pointer;
        }
        .option.active { border-color: #3a7bd5; background: rgba(58, 123, 213, 0.1); color: #00d2ff; }

        .btn {
            width: 100%; padding: 14px; border-radius: 10px; border: none;
            font-weight: bold; font-size: 14px; cursor: pointer; margin-top: 10px;
        }
        .btn-red { background: var(--red-accent); color: white; }
        .btn-green { background: var(--green-accent); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border-color); color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="badge">⚡ Mrwanx Proxy Mini App</div>
        <div style="font-size: 18px; font-weight: bold;">Faster Activation • Premium UI</div>
    </div>

    <div class="section-title">🔐 Activation & Status</div>
    
    <div class="input-group">
        <label>Public IPv4</label>
        <div class="input-wrapper">
            <input type="text" id="ip-field" placeholder="1.2.3.4">
        </div>
    </div>

    <div class="input-group">
        <label>License Key</label>
        <div class="input-wrapper">
            <input type="text" id="key-field" placeholder="XXXX-XXXX-XXXX-XXXX">
        </div>
    </div>

    <button class="btn btn-red" onclick="sendData()">✅ Activate Key</button>
    <button class="btn btn-green">📊 Check Status</button>

    <div class="section-title">📡 Proxy Settings</div>
    <div class="proxy-options">
        <div class="option active" onclick="setMode(this, 'Antena')">📡 Antena</div>
        <div class="option" onclick="setMode(this, 'No Antena')">🚫 No Antena</div>
    </div>

    <button class="btn btn-outline" onclick="detectIP()">🌍 Detect My Public IP</button>
    <button class="btn btn-outline" onclick="autoFormat()">✨ Auto-format Key</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let currentMode = 'Antena';

    function setMode(el, mode) {
        document.querySelectorAll('.option').forEach(opt => opt.classList.remove('active'));
        el.classList.add('active');
        currentMode = mode;
    }

    async function detectIP() {
        const field = document.getElementById('ip-field');
        field.value = "Loading...";
        try {
            const res = await fetch('https://ipify.org');
            const data = await res.json();
            field.value = data.ip;
        } catch (e) { field.value = "Error"; }
    }

    function autoFormat() {
        let key = document.getElementById('key-field').value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        let formatted = key.match(/.{1,4}/g)?.join('-') || key;
        document.getElementById('key-field').value = formatted.substring(0, 19);
    }

    function sendData() {
        const ip = document.getElementById('ip-field').value;
        const key = document.getElementById('key-field').value;
        
        if(!ip || !key) return alert("Fill all fields!");

        tg.sendData(`action:activate|key:${key}|ip:${ip}|mode:${currentMode}`);
        tg.close();
    }

    detectIP();
</script>

</body>
</html>
