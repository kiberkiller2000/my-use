<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAMP — Активация ключа</title>
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-main: #f0f6fc;
            --text-secondary: #8b949e;
            --blue-btn: linear-gradient(180deg, #00d2ff 0%, #3a7bd5 100%);
        }

        body {
            background-color: #0b0e14;
            color: var(--text-main);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 380px;
            box-sizing: border-box;
        }

        .header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
        .logo { background: #00f2ff; color: black; font-weight: bold; width: 30px; height: 30px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .title { font-size: 18px; font-weight: 700; }
        .subtitle { color: var(--text-secondary); font-size: 12px; margin-bottom: 25px; }

        .label { font-size: 11px; text-transform: uppercase; color: var(--text-secondary); font-weight: 600; margin-bottom: 8px; letter-spacing: 0.5px; }
        
        .input-wrapper { background: #0d1117; border: 1px solid var(--border-color); border-radius: 10px; padding: 14px; margin-bottom: 20px; }
        input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 14px; }
        input::placeholder { color: #484f58; }

        .mode-selector { display: flex; gap: 8px; margin-bottom: 20px; }
        .mode-btn { 
            flex: 1; background: #21262d; border: 1px solid var(--border-color); 
            padding: 10px; border-radius: 8px; text-align: center; font-size: 12px; 
            cursor: pointer; color: var(--text-secondary);
        }
        .mode-btn.active { border-color: #58a6ff; color: #58a6ff; background: rgba(88, 166, 255, 0.1); }

        .info-text { font-size: 12px; color: #484f58; line-height: 1.4; margin-bottom: 25px; }

        .btn {
            width: 100%; padding: 14px; border-radius: 10px; font-weight: 700;
            border: none; cursor: pointer; margin-bottom: 10px; font-size: 15px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-blue { background: var(--blue-btn); color: #000; }
        .btn-dark { background: #21262d; color: white; border: 1px solid var(--border-color); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">R</div>
        <div class="title">RAMP — Авторизация</div>
    </div>
    <div class="subtitle">Привязка лицензии к вашему IP</div>

    <div class="label">ВАШ ТЕКУЩИЙ IP</div>
    <div class="input-wrapper">
        <input type="text" id="ip-field" readonly value="Определяем...">
    </div>

    <div class="label">ЛИЦЕНЗИОННЫЙ КЛЮЧ</div>
    <div class="input-wrapper">
        <input type="text" id="key-field" placeholder="XXXX-XXXX-XXXX-XXXX">
    </div>

    <div class="label">ВЫБЕРИТЕ РЕЖИМ</div>
    <div class="mode-selector">
        <div class="mode-btn active" onclick="setMode(this, 'Antena')">Antena</div>
        <div class="mode-btn" onclick="setMode(this, 'No Antena')">No Antena</div>
    </div>

    <div class="info-text">
        Ваш IP будет привязан к ключу. Это необходимо для работы софта.
    </div>

    <button class="btn btn-blue" onclick="send()">Привязать / Проверить</button>
    <button class="btn btn-dark">■ Как установить софт?</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    let mode = 'Antena';

    function setMode(el, m) {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        mode = m;
    }

    fetch('https://ipify.org').then(r => r.json()).then(d => {
        document.getElementById('ip-field').value = d.ip;
    });

    function send() {
        const key = document.getElementById('key-field').value;
        if(!key) return alert("Введите ключ!");
        tg.sendData(`mode:${mode}|key:${key}`);
        tg.close();
    }
</script>

</body>
</html>
