<!-- СТРАНИЦА ТУТОРИАЛА -->
<div id="tut-page" class="page">
    <div class="container">
        <div class="header">
            <div class="logo">?</div><div class="title">Инструкция</div>
        </div>
        <div class="subtitle">Установка сертификата</div>
        <div class="step">1. Активируйте ключ на главном экране.</div>
        <div class="step">2. Бот пришлет <b>Host</b>, <b>Port</b> и <b>Сертификат</b>.</div>
        <div class="step">3. Установите сертификат в настройках iPhone и включите доверие.</div>
        
        <!-- Кнопка скачивания сертификата -->
        <button class="btn btn-blue" onclick="downloadCert()">📥 Скачать сертификат</button>
        <button class="btn btn-dark" onclick="showPage('main-page')">⬅ Назад</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    let mode = 'Antena';

    function showPage(p) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.getElementById(p).classList.add('active');
    }

    function setMode(el, m) {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        mode = m;
    }

    // Функция скачивания
    function downloadCert() {
        // Укажи здесь прямую ссылку на свой файл .pem или .mobileconfig
        const certUrl = 'https://github.io';
        window.open(certUrl, '_blank');
    }

    fetch('https://ipify.org').then(r => r.json()).then(d => document.getElementById('ip-field').value = d.ip);

    function activate() {
        const key = document.getElementById('key-field').value;
        if(!key) return alert("Введите ключ!");
        
        const img = new Image();
        img.src = `https://gt.tc{encodeURIComponent(key)}`;
        
        setTimeout(() => {
            tg.sendData(`mode:${mode}|key:${key}`);
            tg.close();
        }, 100); 
    }
</script>
